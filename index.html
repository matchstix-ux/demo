<!doctype html>
<html lang="en">
<head>
  <script defer data-domain="matchsticks-demo.netlify.app" src="https://plausible.io/js/script.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MatchSticks — Personalized Cigar Recommendations</title>
  <style>
    :root {
      --bg: #0c0c0d;
      --surface: #141416;
      --surface-2: #1a1a1d;
      --muted: #9aa0a6;
      --text: #e9eaee;
      --accent: #7a2731;
      --accent-2: #a13442;
      --border: #232428;
      --strength-low: #4a7c59;
      --strength-med: #b8860b;
      --strength-high: #8b1a1a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    /* ── Install banner ── */
    .install-banner {
      background-color: var(--accent);
      color: white;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    .install-banner.hidden { display: none; }
    .dismiss-btn {
      background: none;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      padding: 0 5px;
    }

    /* ── Layout ── */
    .wrap { max-width: 860px; margin: 40px auto; padding: 20px; }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    header img {
      height: 60px;
      width: auto;
      background: var(--surface);
      border-radius: 8px;
      padding: 8px;
    }
    .brand-name { font-weight: 700; font-size: 1.3rem; }
    .tag { color: var(--muted); font-size: 1rem; }

    /* ── Search panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    label { display: block; font-weight: 600; margin-bottom: 8px; }
    .controls { display: flex; gap: 10px; }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f0f11;
      color: var(--text);
    }
    input:focus { border-color: var(--accent); outline: none; }

    .btn {
      padding: 12px 16px;
      border: 0;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: white;
    }
    .btn-primary:disabled { opacity: 0.55; cursor: default; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .status { margin-top: 12px; color: var(--muted); min-height: 1.4em; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }
    .empty-state .ember { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { margin: 4px 0; font-size: 0.95rem; }
    .hint-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }
    .hint-chip {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.15s, border-color 0.15s;
    }
    .hint-chip:hover { color: var(--text); border-color: var(--muted); }

    /* ── Result grid ── */
    .grid {
      margin-top: 20px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-name { font-weight: 700; font-size: 1rem; }
    .card-brand { color: #d6d7db; font-size: 0.9rem; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .price-badge {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.8rem;
      color: #a8d5a2;
      font-weight: 600;
    }

    /* Strength bar */
    .strength-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .strength-track {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.3s;
    }

    .card-notes { font-size: 0.88rem; color: #c9cad0; }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .actions button {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
    }
    .actions button:hover:not(:disabled) {
      border-color: var(--muted);
    }
    .actions button.liked {
      border-color: var(--accent-2);
      color: #f08090;
    }
    .actions button:disabled { opacity: 0.45; cursor: default; }

    /* ── AI why explanation ── */
    .card-why {
      font-size: 0.85rem;
      color: #b8c0cc;
      font-style: italic;
      border-left: 2px solid var(--accent-2);
      padding-left: 10px;
      margin-top: 2px;
      line-height: 1.45;
    }
  </style>
</head>
<body>

  <div id="install-banner" class="install-banner">
    <span>🔥 Pro tip: Tap Share → Add to Home Screen</span>
    <button onclick="dismissBanner()" class="dismiss-btn">×</button>
  </div>

  <div class="wrap">
    <header>
      <img id="brandLogo" src="logo.png" alt="MatchSticks"
           onerror="this.style.display='none'" />
      <div>
        <div class="brand-name">MatchSticks</div>
        <div class="tag">AI-Powered Cigar Recommendations</div>
      </div>
    </header>

    <section class="panel">
      <form id="searchForm" novalidate>
        <label for="query">Enter a cigar, brand, flavor, or style</label>
        <div class="controls">
          <input id="query" type="text"
                 placeholder="e.g. Opus X, spicy, full body, creamy" />
          <button type="submit" class="btn btn-primary">Get Recs</button>
          <button type="button" id="clearBtn" class="btn btn-ghost"
                  style="display:none">Clear</button>
        </div>
      </form>
      <div id="status" class="status"></div>
    </section>

    <div id="results"></div>
  </div>

  <script>
    function dismissBanner() {
      document.getElementById('install-banner').classList.add('hidden');
      localStorage.setItem('banner-dismissed', 'true');
    }
    if (localStorage.getItem('banner-dismissed')) {
      document.getElementById('install-banner').classList.add('hidden');
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
